<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon 💕</title>
    <link rel="stylesheet" href="../css/anniversary.css" />
  </head>

  <body>
    <audio loop id="bgMusic">
      <source src="../assets/music/THIS WINTER, TO YOU (HAPPY BIRTHDAY)  YELLOW PAPER (HANROM) - everyday~ athalia!.mp3" />
    </audio>

    <div class="floating-hearts">
      <div class="floating-heart">❤️</div>
      <div class="floating-heart">💕</div>
      <div class="floating-heart">❤️</div>
      <div class="floating-heart">💖</div>
      <div class="floating-heart">❤️</div>
    </div>

    <div class="anniversary-container">
      <div class="lock-icon">🔒</div>
      <h1 class="anniversary-title">Coming Soon</h1>
      <p class="subtitle">Một điều đặc biệt đang chờ đợi...</p>
      
      <div class="countdown-container">
        <div class="countdown-title">Mở khóa vào</div>
        <div class="unlock-date">17/3/2026</div>
        
        <div class="countdown" id="countdown">
          <div class="countdown-item">
            <div class="countdown-value" id="days">00</div>
            <div class="countdown-label">Ngày</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="hours">00</div>
            <div class="countdown-label">Giờ</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="minutes">00</div>
            <div class="countdown-label">Phút</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="seconds">00</div>
            <div class="countdown-label">Giây</div>
          </div>
        </div>
      </div>

      <div class="heart-container">
        <div class="heart">💕</div>
      </div>

      <div class="anniversary-buttons">
        <a href="../index.html" class="anniversary-btn" onclick="goBackToIndex()">← Quay lại</a>
      </div>
    </div>

    <script src="../js/anniversary.js"></script>
  </body>
</html>
